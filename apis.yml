aid: solar-edge
name: SolarEdge
description: >-
  SolarEdge Technologies provides a cloud-based Monitoring API that enables web
  services and third-party applications to access real-time and historical solar
  production data stored on the SolarEdge monitoring server. The REST API
  delivers site energy measurements, power flow data, inverter technical
  telemetry, battery storage status, equipment inventory, and environmental
  benefit metrics for SolarEdge-connected systems. Authentication is handled via
  an API key generated through the SolarEdge monitoring portal, and all requests
  are made over HTTPS with responses returned in JSON format. The platform
  supports both site-level and account-level queries, with bulk call options
  allowing developers to retrieve data across multiple sites in a single
  request. SolarEdge serves residential, commercial, and utility-scale solar
  installations globally, making their API central to energy management
  integrations, home automation platforms, and fleet monitoring solutions.
