apis:
  - aid: solar-edge:solar-edge-monitoring-api
    name: SolarEdge Monitoring API
    description: >-
      The SolarEdge Monitoring API provides programmatic access to data from
      SolarEdge solar energy systems, including site overview metrics, energy
      production measurements, real-time power flow, inverter technical data,
      battery storage status, equipment inventory, environmental benefits, and
      equipment change logs. All endpoints are accessed via HTTPS using an
      API key passed as a URL query parameter.
